<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Người dùng</title>

    <!-- React CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        h1 {
            font-size: 26px;
            color: #1a1a2e;
            margin-bottom: 24px;
            border-left: 4px solid #4caf50;
            padding-left: 12px;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 10px 14px;
            font-size: 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: #4caf50;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition:
                background 0.2s,
                transform 0.1s;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-green {
            background: #4caf50;
            color: white;
        }

        .btn-green:hover {
            background: #43a047;
        }

        .btn-blue {
            background: #2196f3;
            color: white;
        }

        .btn-blue:hover {
            background: #1e88e5;
        }

        .btn-red {
            background: #f44336;
            color: white;
        }

        .btn-red:hover {
            background: #e53935;
        }

        .btn-gray {
            background: #9e9e9e;
            color: white;
        }

        .btn-gray:hover {
            background: #757575;
        }

        /* Table */
        .table-wrap {
            overflow-x: auto;
            margin: 0 0 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background: #4caf50;
            color: white;
            padding: 12px 14px;
            text-align: left;
            font-weight: 700;
            white-space: nowrap;
        }

        td {
            padding: 11px 14px;
            border-bottom: 1px solid #eee;
            color: #333;
        }

        tr:nth-child(even) td {
            background: #fafafa;
        }

        tr:hover td {
            background: #f0fdf0;
        }

        .actions {
            display: flex;
            gap: 6px;
        }

        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }

        .pagination select {
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .page-info {
            font-size: 14px;
            color: #555;
        }

        .page-nav {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-nav {
            padding: 7px 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn-nav:hover:not(:disabled) {
            background: #f0fdf0;
            border-color: #4caf50;
        }

        .btn-nav:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.15s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: white;
            padding: 28px;
            border-radius: 10px;
            width: 420px;
            max-width: 94vw;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.2s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 18px;
            color: #1a1a2e;
        }

        .btn-close {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: #888;
            line-height: 1;
        }

        .btn-close:hover {
            color: #f44336;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
        }

        .form-input {
            width: 100%;
            padding: 9px 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: #4caf50;
        }

        .form-input.error-input {
            border-color: #f44336;
        }

        .error-msg {
            color: #f44336;
            font-size: 12px;
            margin-top: 4px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }

        .empty-row td {
            text-align: center;
            padding: 30px;
            color: #999;
        }

        .total-info {
            font-size: 13px;
            color: #777;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 16px;
            }

            h1 {
                font-size: 20px;
            }

            table {
                font-size: 12px;
            }

            td,
            th {
                padding: 8px 6px;
            }

            .modal-content {
                width: 92%;
                padding: 18px;
            }

            .btn {
                min-width: 44px;
                min-height: 44px;
            }

            .pagination {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const API = "http://localhost:3001/api/users";

        function SearchBar({ value, onChange }) {
            const [inputVal, setInputVal] = React.useState(value);

            React.useEffect(() => {
                const timer = setTimeout(() => {
                    onChange(inputVal);
                }, 500);
                return () => clearTimeout(timer);
            }, [inputVal]);

            return (
                <input
                    className="search-input"
                    type="text"
                    placeholder="Tìm kiếm theo tên, email, địa chỉ..."
                    value={inputVal}
                    onChange={(e) => setInputVal(e.target.value)}
                />
            );
        }

        function UserTable({ users, page, limit, onEdit, onDelete }) {
            if (users.length === 0) {
                return (
                    <div className="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>STT</th>
                                    <th>Họ tên</th>
                                    <th>Tuổi</th>
                                    <th>Email</th>
                                    <th>Địa chỉ</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr className="empty-row">
                                    <td colSpan="6">Không có dữ liệu</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                );
            }

            return (
                <div className="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>STT</th>
                                <th>Họ tên</th>
                                <th>Tuổi</th>
                                <th>Email</th>
                                <th>Địa chỉ</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            {users.map((user, idx) => (
                                <tr key={user._id}>
                                    <td>{(page - 1) * limit + idx + 1}</td>
                                    <td>{user.name}</td>
                                    <td>{user.age}</td>
                                    <td>{user.email}</td>
                                    <td>{user.address || "—"}</td>
                                    <td>
                                        <div className="actions">
                                            <button
                                                className="btn btn-blue"
                                                onClick={() => onEdit(user)}
                                            >
                                                Sửa
                                            </button>
                                            <button
                                                className="btn btn-red"
                                                onClick={() => {
                                                    if (
                                                        window.confirm(`Xóa người dùng "${user.name}"?`)
                                                    ) {
                                                        onDelete(user._id);
                                                    }
                                                }}
                                            >
                                                Xóa
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }

        function Pagination({
            page,
            totalPages,
            limit,
            total,
            onPageChange,
            onLimitChange,
        }) {
            return (
                <div className="pagination">
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span className="total-info">Tổng: {total} người dùng</span>
                        <span>|</span>
                        <span>Hiển thị:</span>
                        <select
                            value={limit}
                            onChange={(e) => {
                                onLimitChange(Number(e.target.value));
                                onPageChange(1); 
                            }}
                        >
                            <option value="3">3</option>
                            <option value="5">5</option>
                            <option value="10">10</option>
                        </select>
                        <span>dòng/trang</span>
                    </div>

                    <div className="page-nav">
                        <button
                            className="btn-nav"
                            onClick={() => onPageChange(page - 1)}
                            disabled={page <= 1}
                        >
                            Prev
                        </button>

                        <span className="page-info">
                            Trang {page} / {totalPages || 1}
                        </span>

                        <button
                            className="btn-nav"
                            onClick={() => onPageChange(page + 1)}
                            disabled={page >= totalPages}
                        >
                            Next
                        </button>
                    </div>
                </div>
            );
        }

        function UserModal({ user, onClose, onSave }) {
            const isEdit = Boolean(user);
            const [formData, setFormData] = React.useState(
                user
                    ? {
                        name: user.name,
                        age: user.age,
                        email: user.email,
                        address: user.address || "",
                    }
                    : { name: "", age: "", email: "", address: "" },
            );
            const [errors, setErrors] = React.useState({});
            const [loading, setLoading] = React.useState(false);

            const handleChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
                if (errors[e.target.name]) {
                    setErrors({ ...errors, [e.target.name]: "" });
                }
            };

            const validate = () => {
                const errs = {};
                const name = formData.name.trim();
                const email = formData.email.trim();

                if (!name || name.length < 2)
                    errs.name = "Tên phải có ít nhất 2 ký tự";

                if (
                    formData.age === "" ||
                    formData.age === null ||
                    Number(formData.age) < 0
                )
                    errs.age = "Tuổi phải >= 0";

                if (!email || !email.includes("@") || !email.includes("."))
                    errs.email = "Email không hợp lệ (phải có @ và .)";

                setErrors(errs);
                return Object.keys(errs).length === 0;
            };

            const handleSubmit = async () => {
                if (!validate()) return;
                setLoading(true);

                const url = isEdit ? `${API}/${user._id}` : API;
                const method = isEdit ? "PUT" : "POST";
                const body = {
                    name: formData.name.trim(),
                    age: Number(formData.age),
                    email: formData.email.trim(),
                    address: formData.address.trim(),
                };

                try {
                    const res = await fetch(url, {
                        method,
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(body),
                    });
                    const data = await res.json();

                    if (!res.ok || data.error) {
                        alert("Lỗi: " + (data.error || "Không xác định"));
                    } else {
                        alert(data.message);
                        onSave();
                    }
                } catch (err) {
                    alert("Lỗi kết nối: " + err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h3>{isEdit ? "Sửa người dùng" : "Thêm người dùng"}</h3>
                            <button className="btn-close" onClick={onClose}>
                                ×
                            </button>
                        </div>

                        <div className="form-group">
                            <label>Họ tên *</label>
                            <input
                                className={`form-input ${errors.name ? "error-input" : ""}`}
                                name="name"
                                value={formData.name}
                                onChange={handleChange}
                                placeholder="Nguyễn Văn A"
                            />
                            {errors.name && <p className="error-msg">{errors.name}</p>}
                        </div>

                        <div className="form-group">
                            <label>Tuổi *</label>
                            <input
                                className={`form-input ${errors.age ? "error-input" : ""}`}
                                name="age"
                                type="number"
                                min="0"
                                value={formData.age}
                                onChange={handleChange}
                                placeholder="25"
                            />
                            {errors.age && <p className="error-msg">{errors.age}</p>}
                        </div>

                        <div className="form-group">
                            <label>Email *</label>
                            <input
                                className={`form-input ${errors.email ? "error-input" : ""}`}
                                name="email"
                                type="email"
                                value={formData.email}
                                onChange={handleChange}
                                placeholder="example@gmail.com"
                            />
                            {errors.email && <p className="error-msg">{errors.email}</p>}
                        </div>

                        <div className="form-group">
                            <label>Địa chỉ</label>
                            <input
                                className="form-input"
                                name="address"
                                value={formData.address}
                                onChange={handleChange}
                                placeholder="Hà Nội (không bắt buộc)"
                            />
                        </div>

                        <div className="modal-actions">
                            <button className="btn btn-gray" onClick={onClose}>
                                Hủy
                            </button>
                            <button
                                className="btn btn-green"
                                onClick={handleSubmit}
                                disabled={loading}
                            >
                                {loading ? "Đang lưu..." : "Lưu"}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [users, setUsers] = React.useState([]);
            const [page, setPage] = React.useState(1);
            const [limit, setLimit] = React.useState(5);
            const [search, setSearch] = React.useState("");
            const [total, setTotal] = React.useState(0);
            const [totalPages, setTotalPages] = React.useState(0);
            const [showModal, setShowModal] = React.useState(false);
            const [editingUser, setEditingUser] = React.useState(null);
            const [loading, setLoading] = React.useState(false);

            const fetchUsers = async () => {
                setLoading(true);
                try {
                    const url = `${API}?page=${page}&limit=${limit}&search=${encodeURIComponent(search)}`;
                    const res = await fetch(url);
                    if (!res.ok) throw new Error("Lỗi server");
                    const data = await res.json();
                    setUsers(data.data);
                    setTotal(data.total);
                    setTotalPages(data.totalPages);
                } catch (err) {
                    console.error("Fetch error:", err);
                    alert("Không thể kết nối đến server: " + err.message);
                } finally {
                    setLoading(false);
                }
            };

            React.useEffect(() => {
                fetchUsers();
            }, [page, limit, search]);

            const handleSearchChange = (val) => {
                setSearch(val);
                setPage(1); 
            };

            const deleteUser = async (id) => {
                try {
                    const res = await fetch(`${API}/${id}`, { method: "DELETE" });
                    const data = await res.json();
                    if (!res.ok) {
                        alert("Lỗi: " + data.error);
                    } else {
                        alert(data.message);
                        if (users.length === 1 && page > 1) {
                            setPage(page - 1);
                        } else {
                            fetchUsers();
                        }
                    }
                } catch (err) {
                    alert("Lỗi: " + err.message);
                }
            };

            const openAdd = () => {
                setEditingUser(null);
                setShowModal(true);
            };

            const openEdit = (user) => {
                setEditingUser(user);
                setShowModal(true);
            };

            const handleSave = () => {
                setShowModal(false);
                fetchUsers();
            };

            return (
                <div className="container">
                    <h1>Quản lý Người dùng</h1>

                    <div className="toolbar">
                        <SearchBar value={search} onChange={handleSearchChange} />
                        <button className="btn btn-green" onClick={openAdd}>
                            + Thêm người dùng
                        </button>
                    </div>

                    {loading ? (
                        <p style={{ textAlign: "center", padding: 30, color: "#999" }}>
                            Đang tải...
                        </p>
                    ) : (
                        <UserTable
                            users={users}
                            page={page}
                            limit={limit}
                            onEdit={openEdit}
                            onDelete={deleteUser}
                        />
                    )}

                    <Pagination
                        page={page}
                        totalPages={totalPages}
                        limit={limit}
                        total={total}
                        onPageChange={setPage}
                        onLimitChange={(newLimit) => {
                            setLimit(newLimit);
                            setPage(1);
                        }}
                    />

                    {showModal && (
                        <UserModal
                            user={editingUser}
                            onClose={() => setShowModal(false)}
                            onSave={handleSave}
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>

</html>
